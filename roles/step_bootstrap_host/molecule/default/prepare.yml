---
- hosts: ubuntu:debian
  tasks:
    - name: Update apt
      apt:
        update_cache: true

- hosts: rockylinux:fedora
  tasks:
    # Required to prevent issues with ansible_default_ipv4 missing
    - name: Install iproute
      package:
        name: iproute

- hosts: clients
  tasks:
    - name: Add Test Users
      ansible.builtin.user:
        name: "{{ item }}"
        create_home: true
        password: "*"
      loop:
        - max
        - ari
