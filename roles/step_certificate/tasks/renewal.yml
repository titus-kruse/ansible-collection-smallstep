# shell is required due to "command" being a shell builtin
- name: Get absolute step command path # noqa command-instead-of-shell
  shell: "command -v {{ step_cli_executable }}"
  become: yes
  check_mode: no
  changed_when: no
  register: _step_cli_executable_absolute

- name: Setup sudo permissions for renewal from step_cert_user
  block:
    - name: Get absolute systemctl command path # noqa command-instead-of-shell
      shell: "command -v systemctl"
      register: _step_systemctl_binary
      changed_when: no
      check_mode: no
    - name: Step user has sudo permissions to restart required systemd units
      template:
        src: sudo-renewal.j2
        dest: "/etc/sudoers.d/99_{{ step_cert_renewal_service }}_systemd"
        owner: root
        group: root
        mode: "400"
  when:
    - step_cert_renewal_reload_services | length > 0
    - step_cert_user != "root"

- name: Configure certificate renewal service
  template:
    src: step-renew.service.j2
    dest: "/etc/systemd/system/{{ step_cert_renewal_service }}.service"
    owner: root
    group: root
    mode: 0644
  notify: restart renewal service

- name: Ensure certificate renewal service is enabled and running
  systemd:
    daemon_reload: yes
    name: "{{ step_cert_renewal_service }}"
    state: started
    enabled: yes
